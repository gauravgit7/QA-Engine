<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAT Test Case Generator - QA Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS for Excel Exports -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <style>
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(0,180,216,0.1); border-radius: 20px; font-size: 0.82rem; font-weight: 500; color: var(--accent-color); }
        .stat-chip i { font-size: 0.75rem; }
        .stats-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
        .coverage-bar { height: 8px; border-radius: 4px; background: #e9ecef; overflow: hidden; margin-top: 6px; }
        .coverage-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .coverage-fill.high { background: linear-gradient(90deg, #20c997, #17a2b8); }
        .coverage-fill.medium { background: linear-gradient(90deg, #ffc107, #fd7e14); }
        .coverage-fill.low { background: linear-gradient(90deg, #dc3545, #e74c3c); }
        .meta-row { display: flex; flex-wrap: wrap; gap: 20px; padding: 12px 16px; background: var(--bg-color); border-radius: var(--border-radius); font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; border: 1px solid var(--glass-border); }
        .meta-row strong { color: var(--text-dark); }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: center; }
        .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.85rem; background: var(--surface-color); color: var(--text-dark); }
        .filter-bar input { flex: 1; min-width: 200px; }
        .filter-bar select { min-width: 140px; }
        .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 0; font-size: 0.85rem; }
        .pagination-bar button { padding: 6px 16px; border: 1px solid #ccc; background: var(--surface-color); border-radius: 8px; cursor: pointer; color: var(--text-dark); }
        .pagination-bar button:disabled { opacity: 0.4; cursor: default; }
        .pagination-bar button:hover:not(:disabled) { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .coverage-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .coverage-item { padding: 16px; border-radius: var(--border-radius); border: 1px solid var(--glass-border); background: var(--surface-color); }
        .coverage-item h4 { font-size: 0.85rem; margin-bottom: 6px; color: var(--text-muted); }
        .coverage-item .pct { font-size: 1.6rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar injected via common.js -->
        <main class="main-content">
            <!-- Topbar injected via common.js -->
            
            <div class="page-body">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-flask" style="margin-right: 8px; color: var(--accent-color);"></i>Generate UAT Test Cases</div>
                    </div>
                    
                    <div class="alert alert-error" id="formError"></div>

                    <form id="uatForm">
                        <div class="form-row">
                            <div class="form-col" style="flex: 1.5;">
                                <div class="form-group">
                                    <label class="form-label">Upload BRD/PRD Document</label>
                                    <label for="fileUpload" class="file-upload-zone" id="dropZone">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <p>Click or drag & drop a file here</p>
                                        <span class="form-text">Supported formats: PDF, DOCX, TXT, MD. Max size: 10MB</span>
                                        <input type="file" id="fileUpload" name="fileUpload" accept=".pdf,.docx,.txt,.md" />
                                    </label>
                                    <div id="fileInfo" class="mt-1 d-none" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0, 180, 216, 0.1); border-radius: var(--border-radius);">
                                        <div><i class="fas fa-file-alt" style="color: var(--accent-color); margin-right: 8px;"></i> <span id="fileName"></span></div>
                                        <button type="button" class="btn" style="padding: 4px; color: var(--error-color); background: none; min-width: 0;" onclick="removeFile()">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="text-center" style="margin: 20px 0; position: relative;">
                                    <hr style="border: none; border-top: 1px solid #ced4da;">
                                    <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--surface-color); padding: 0 16px; color: var(--text-muted); font-weight: 500; font-size: 0.9rem;">OR</span>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label" for="manualInput">Manual Context Input</label>
                                    <textarea id="manualInput" class="form-control" placeholder="Paste BRD/PRD content, user stories, or business requirements..." style="min-height: 100px;"></textarea>
                                </div>
                            </div>

                            <div class="form-col" style="flex: 1; padding: 24px; background: #fafafa; border-radius: var(--border-radius); border: 1px solid #eaeaea;">
                                <h4 style="margin-bottom: 20px; color: var(--secondary-color); font-weight: 600;"><i class="fas fa-cogs" style="margin-right: 8px;"></i>Generation Configuration</h4>
                                
                                <div class="form-group">
                                    <label class="form-label">Generation Method</label>
                                    <div style="display: flex; gap: 16px;">
                                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem;">
                                            <input type="radio" name="genMethod" value="rules" checked> Rules Engine
                                        </label>
                                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem;">
                                            <input type="radio" name="genMethod" value="llm"> AI / LLM
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="targetCount">Target Test Case Count</label>
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <input type="range" id="targetCount" min="10" max="100" value="50" style="flex: 1;" oninput="document.getElementById('countLabel').textContent=this.value">
                                        <span id="countLabel" style="font-weight: 600; font-size: 1.1rem; min-width: 30px;">50</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="domainHint">Business Domain</label>
                                    <select id="domainHint" class="form-control">
                                        <option value="">Auto-Detect</option>
                                        <option value="ecommerce">E-Commerce</option>
                                        <option value="banking">Banking & Finance</option>
                                        <option value="healthcare">Healthcare</option>
                                        <option value="education">Education</option>
                                        <option value="logistics">Logistics</option>
                                        <option value="enterprise">Enterprise Software</option>
                                    </select>
                                </div>

                                <hr style="border: none; border-top: 1px solid #ddd; margin: 16px 0;">

                                <div class="config-grid">
                                    <div class="form-group">
                                        <label class="form-label" for="epicId">Epic ID</label>
                                        <input type="text" id="epicId" class="form-control" placeholder="e.g. FF-101">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="storyId">Story ID</label>
                                        <input type="text" id="storyId" class="form-control" placeholder="e.g. FF-205">
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label" for="testCaseId">Base Test Case ID</label>
                                    <input type="text" id="testCaseId" class="form-control" placeholder="e.g. TC-UAT">
                                </div>
                            </div>
                        </div>

                        <div class="mt-3" style="text-align: right;">
                            <button type="submit" class="btn btn-primary" id="generateBtn">
                                <i class="fas fa-magic"></i> Generate UAT Cases
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Document Stats -->
                <div class="card d-none" id="docStatsCard">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-chart-bar" style="margin-right: 8px; color: var(--accent-color);"></i>Document Analysis</div>
                    </div>
                    <div class="stats-bar" id="docStatsBar"></div>
                </div>

                <!-- Coverage Dashboard -->
                <div class="card d-none" id="coverageCard">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-shield-alt" style="margin-right: 8px; color: #20c997;"></i>Coverage Analysis</div>
                    </div>
                    <div class="coverage-card" id="coverageDashboard"></div>
                </div>

                <!-- Results Output Table Structure -->
                <div class="card d-none" id="resultsCard">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-list-check" style="margin-right: 8px;"></i>Generated UAT Test Cases (<span id="totalCount">0</span>)</div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-secondary" onclick="exportTableToExcel('casesTable', 'UAT_Test_Cases')">
                                <i class="fas fa-file-excel" style="color: #217346;"></i> Excel
                            </button>
                            <button class="btn btn-secondary" onclick="exportToCSV()">
                                <i class="fas fa-file-csv" style="color: #2196F3;"></i> CSV
                            </button>
                        </div>
                    </div>

                    <div id="fallbackWarning" class="alert alert-error" style="display: none; margin-bottom: 16px;"></div>
                    <div class="meta-row" id="genMetadata" style="display: none;"></div>

                    <!-- Filter Bar -->
                    <div class="filter-bar">
                        <input type="text" id="filterSearch" placeholder="Search test cases..." oninput="applyFilters()">
                        <select id="filterPriority" onchange="applyFilters()">
                            <option value="">All Priorities</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <select id="filterType" onchange="applyFilters()">
                            <option value="">All Types</option>
                            <option value="Positive">Positive</option>
                            <option value="Negative">Negative</option>
                            <option value="Edge">Edge</option>
                            <option value="Security">Security</option>
                            <option value="Performance">Performance</option>
                        </select>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table" id="casesTable">
                            <thead>
                                <tr>
                                    <th style="min-width: 90px;">ID</th>
                                    <th style="min-width: 200px;">Title</th>
                                    <th style="min-width: 80px;">Type</th>
                                    <th style="min-width: 100px;">Role</th>
                                    <th style="min-width: 200px;">Preconditions</th>
                                    <th style="min-width: 300px;">Steps</th>
                                    <th style="min-width: 200px;">Expected Result</th>
                                    <th style="min-width: 120px;">Test Data</th>
                                    <th style="min-width: 80px;">Priority</th>
                                </tr>
                            </thead>
                            <tbody id="casesTableBody">
                                <!-- Generated JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination-bar">
                        <span id="pageInfo">Showing 0 of 0</span>
                        <div style="display: flex; gap: 8px;">
                            <button onclick="changePage(-1)" id="prevBtn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
                            <button onclick="changePage(1)" id="nextBtn" disabled>Next <i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>

            </div>
            
            <!-- Footer -->
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/uat.js"></script>
</body>
</html>
