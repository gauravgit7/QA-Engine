<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FirstFintech QA Engine</title>
    
    <!-- Meta Descriptions for SEO -->
    <meta name="description" content="Login to the FirstFintech QA Engine to generate test cases easily and efficiently.">
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container login-page">
        <div class="login-left">
            <div class="login-brand">
                <h1>FirstFintech</h1>
                <p>Intelligent QA Engine Platform</p>
                <div style="margin-top: 40px; opacity: 0.9;">
                    <i class="fas fa-microchip" style="font-size: 4rem; margin-bottom: 20px;"></i>
                    <p style="font-size: 1rem;">Automate test case generation with AI</p>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-card">
                <h2>Welcome back</h2>
                <p>Please enter your details to sign in.</p>
                
                <div class="alert alert-error" id="loginError" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email or Username</label>
                        <input type="text" id="email" name="email" class="form-control" placeholder="admin@firstfintech.com" autocomplete="username">
                        <span class="error-text d-none" id="emailError">This field is required.</span>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
                        <span class="error-text d-none" id="passwordError">This field is required.</span>
                    </div>

                    <div class="form-group d-flex justify-between align-center">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" style="font-size: 0.9rem;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <div class="text-center mt-3" style="font-size: 0.9rem; color: var(--text-muted);">
                        Developed by Gaurav Subedi
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
