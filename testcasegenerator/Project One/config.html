<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - QA Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar injected via common.js -->
        <main class="main-content">
            <!-- Topbar injected via common.js -->
            
            <div class="page-body">
                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <div class="card-header">
                        <div class="card-title">System Configuration</div>
                    </div>
                    
                    <div class="alert alert-error" id="configError"></div>
                    <div class="alert alert-success" id="configSuccess"></div>

                    <form id="configForm">
                        <div style="margin-bottom: 32px;">
                            <h4 style="margin-bottom: 16px; color: var(--secondary-color); font-weight: 600; border-bottom: 1px solid #eaeaea; padding-bottom: 8px;">Jira Integration</h4>
                            
                            <div class="form-group">
                                <label class="form-label" for="jiraBaseUrl">Jira Base URL</label>
                                <input type="url" id="jiraBaseUrl" class="form-control" placeholder="https://your-domain.atlassian.net">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="jiraEmail">Jira Email / Username</label>
                                <input type="email" id="jiraEmail" class="form-control" placeholder="user@company.com">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="jiraToken">Jira API Token</label>
                                <div style="position: relative;">
                                    <input type="password" id="jiraToken" class="form-control" placeholder="Paste your Jira API token here" style="padding-right: 40px;">
                                    <button type="button" class="btn" onclick="togglePasswordVisibility('jiraToken')" style="position: absolute; right: 5px; top: 5px; background: none; color: var(--text-muted); padding: 5px 10px; min-width: 0;">
                                        <i class="fas fa-eye" id="jiraTokenIcon"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div style="margin-bottom: 32px;">
                            <h4 style="margin-bottom: 16px; color: var(--secondary-color); font-weight: 600; border-bottom: 1px solid #eaeaea; padding-bottom: 8px;">LLM Integration</h4>
                            
                            <div class="form-group">
                                <label class="form-label" for="llmApiKey">LLM API Key (OpenAI / Gemini)</label>
                                <div style="position: relative;">
                                    <input type="password" id="llmApiKey" class="form-control" placeholder="sk-..." style="padding-right: 40px;">
                                    <button type="button" class="btn" onclick="togglePasswordVisibility('llmApiKey')" style="position: absolute; right: 5px; top: 5px; background: none; color: var(--text-muted); padding: 5px 10px; min-width: 0;">
                                        <i class="fas fa-eye" id="llmApiKeyIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="ollamaModel">Ollama Model</label>
                                <input type="text" id="ollamaModel" class="form-control" placeholder="llama3:latest" value="llama3:latest">
                                <small class="form-text text-muted">Model to use with local Ollama (e.g., llama3:latest, llama3.1:8b)</small>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #eaeaea;">
                            <button type="button" class="btn btn-secondary" onclick="document.getElementById('configForm').reset()">Cancel</button>
                            <button type="submit" class="btn btn-primary" id="saveBtn">
                                <i class="fas fa-save"></i> Save Configuration
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
